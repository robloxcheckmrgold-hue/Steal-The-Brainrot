<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Christian Web</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f1117;
  color: white;
  text-align: center;
}
h1 {
  margin-top: 40px;
  font-size: 48px;
  letter-spacing: 1px;
}
.container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 18px;
  padding: 20px;
  max-width: 800px;
  margin: auto;
}
.card {
  background: #1a1d25;
  border-radius: 12px;
  padding: 15px;
  text-decoration: none;
  color: white;
  transition: transform 0.2s, background 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.card:hover {
  transform: scale(1.07);
  background: #272b36;
}
.card img {
  width: 50px;
  height: 50px;
  object-fit: contain;
  margin-bottom: 10px;
}
.card span {
  font-size: 16px;
  font-weight: bold;
  text-align: center;
}
footer {
  margin-top: 30px;
  font-size: 14px;
  color: #777;
  margin-bottom: 20px;
}
</style>
</head>
<body>

<h1>Christian Web</h1>

<div class="container">
  <a class="card" href="https://youtube.com" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b8/YouTube_Logo_2017.svg/200px-YouTube_Logo_2017.svg.png" alt="YouTube">
    <span>YouTube</span>
  </a>

  <a class="card" href="https://microsoft.com" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/96/Microsoft_logo_(2012).svg/200px-Microsoft_logo_(2012).svg.png" alt="Microsoft">
    <span>Microsoft</span>
  </a>

  <a class="card" href="https://amazon.com" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Amazon_logo.svg/200px-Amazon_logo.svg.png" alt="Amazon">
    <span>Amazon</span>
  </a>

  <a class="card" href="https://wikipedia.org" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/63/Wikipedia-logo.png/200px-Wikipedia-logo.png" alt="Wikipedia">
    <span>Wikipedia</span>
  </a>

  <a class="card" href="https://brave.com" target="_blank">
    <img src="https://play-lh.googleusercontent.com/EpN3c0rRfhZmnRjIhPRPA81flzV4K-7C2yqYzRzlbZ8cC-B95ly1bZ3gLXuU3u12Uw" alt="Brave">
    <span>Brave</span>
  </a>
</div>

<footer>Christian Web • Your trusted sites homepage</footer>

</body>
</html>
